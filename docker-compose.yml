# IdeaVault — Local Development Stack
# Usage: docker compose up -d

version: "3.8"

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: ideavault-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ideavault
      POSTGRES_PASSWORD: ideavault_dev_2024
      POSTGRES_DB: ideavault
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ideavault"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis (for rate limiting, caching, sessions)
  redis:
    image: redis:7-alpine
    container_name: ideavault-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local

# Connection strings for .env:
# DATABASE_URL=postgresql://ideavault:ideavault_dev_2024@localhost:5432/ideavault
# REDIS_URL=redis://localhost:6379
